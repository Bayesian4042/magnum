# Conversion table configuration
# The Tech Pallet sheet in the Demand Conversion file is the master reference.
# This file documents the source and any static overrides.

conversion_table:
  source_file: "Converting MRF File to PTG 2025-2026 MRF3- Demand Conversion.xlsx"
  sheet: "Tech Pallet"
  du_column: "DU"
  sub_tech_column: "Sub Tech"
  main_tech_column: "Main Tech"
  litons_column: "Litons"
  per_pallet_column: "Per Pallet"
  liters_per_case_column: "Liters per case"

