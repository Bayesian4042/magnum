# Manual adjustments that are currently hard-coded into Excel but should be
# config-driven so they can be updated without touching pipeline code.

# These DUs represent demand that is not in the main MRF file and must be
# added manually each cycle.
manual_demand_dus:
  - du: 84141102
    description: "B&J Export Pts"
    category: "export"
    monthly_cases: 90000   # flat monthly assumption
    notes: "B&J pint exports - flat assumption unless updated"

  - du: 62735647
    description: "B&J Export Bulk"
    category: "export"
    monthly_cases: 7000
    notes: "B&J bulk exports"

  - du: 84141103
    description: "BJ Pints Dependent Demand"
    category: "dependent_demand"
    monthly_cases: null    # varies monthly - loaded from MRF3 Demand sheet
    notes: "Dependent demand for BJ pints mixed pallets - pulled from MRF3 sheet"

  - du: 69798156
    description: "828ml SMOG"
    category: "smog"
    monthly_cases: null    # varies - only certain months
    notes: "Excess inventory intended for sale; only populated when SMOG exists"

# Innovation items not yet in SAP/RR - add here when a new item is being launched
