# MATDI targets (Days of Inventory) at key checkpoint months
# Used for the Vs Target and Season Readiness outputs
matdi_targets:
  "Apr": 23.68
  "Aug": 17.034
  "Dec": 18.9

# DOH (Days on Hand) target — end of season target communicated by client.
# DOH = Inv / (trailing_12m_demand / 365)
# The trailing 12-month window requires historical demand from SAP.
doh_target: 45

# Inventory case targets at key season checkpoints (from TGT row in client sheet).
# These are the inventory levels leadership wants at each checkpoint.
inventory_case_targets:
  "Apr": 4000000
  "Aug": 3000000
  "Dec": 2900000

# Bandwidth thresholds for Season Readiness traffic light
# Green: bandwidth >= green_threshold
# Yellow: yellow_threshold <= bandwidth < green_threshold
# Red: bandwidth < yellow_threshold
bandwidth_thresholds:
  "48oz":         { green: 0.10, yellow: 0.05 }
  "BJ PTS":       { green: 0.10, yellow: 0.05 }
  "Talenti":      { green: 0.15, yellow: 0.08 }
  "MG Sticks":    { green: 0.20, yellow: 0.10 }
  "Yasso Sticks": { green: 0.15, yellow: 0.08 }
  "default":      { green: 0.10, yellow: 0.05 }
